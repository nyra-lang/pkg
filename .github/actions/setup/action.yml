name: nyrapkg CI setup
description: Rust toolchain, OS deps, and Nyra compiler build (run actions/checkout for nyrapkg + nyra first).

inputs:
  platform:
    description: Runner OS family — linux, macos, or windows
    required: true
  nyra-path:
    description: Path to the Nyra source checkout (stdlib + compiler)
    required: false
    default: nyra

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ inputs.nyra-path }}

    - name: System dependencies (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      run: brew install llvm sqlite z3 zlib

    - name: macOS LLVM paths
      if: inputs.platform == 'macos'
      shell: bash
      run: |
        echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

    - name: Install LLVM (Windows)
      if: inputs.platform == 'windows'
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "18.1.8"

    - name: System dependencies (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: |
        $msysUcrt = 'C:\msys64\ucrt64'
        $pacman = 'C:\msys64\usr\bin\pacman.exe'
        if (Test-Path $pacman) {
          & $pacman -S --noconfirm --needed mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-zlib mingw-w64-ucrt-x86_64-openssl
        }

        $zlibRoot = $null
        $zlibCandidates = @(
          $msysUcrt,
          'C:\vcpkg\installed\x64-windows'
        )
        if ($env:VCPKG_INSTALLATION_ROOT) {
          $zlibCandidates += (Join-Path $env:VCPKG_INSTALLATION_ROOT 'installed\x64-windows')
        }
        foreach ($root in $zlibCandidates) {
          if (Test-Path (Join-Path $root 'include\zlib.h')) {
            $zlibRoot = $root
            break
          }
        }
        if (-not $zlibRoot) {
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT 'vcpkg.exe'
          if (-not (Test-Path $vcpkg)) { $vcpkg = 'C:\vcpkg\vcpkg.exe' }
          if (Test-Path $vcpkg) {
            & $vcpkg install zlib:x64-windows
            foreach ($root in $zlibCandidates) {
              if (Test-Path (Join-Path $root 'include\zlib.h')) {
                $zlibRoot = $root
                break
              }
            }
          }
        }
        if (-not $zlibRoot) {
          Write-Error 'zlib headers not found (need MSYS2 ucrt64 or vcpkg)'
        }
        function Add-GhEnvLine([string]$Line) {
          # Out-File -Encoding utf8 writes a BOM that breaks Nyra's NYRA_SYSROOT/gcc lookup.
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "${Line}`n")
        }
        Add-GhEnvLine "ZLIB_ROOT=$zlibRoot"
        if (Test-Path (Join-Path $msysUcrt 'include\stdlib.h')) {
          Add-GhEnvLine "NYRA_SYSROOT=$msysUcrt"
        }

    - name: System dependencies (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang lld libclang-dev llvm-dev libsqlite3-dev zlib1g-dev libssl-dev python3 git

    - name: Build Nyra compiler
      shell: bash
      env:
        RUSTUP_WINDOWS_PATH_ADD_BIN: "0"
      run: |
        set -euo pipefail
        NYRA_ROOT="${{ github.workspace }}/${{ inputs.nyra-path }}"
        test -d "$NYRA_ROOT/stdlib" || { echo "missing Nyra stdlib at $NYRA_ROOT" >&2; exit 1; }
        cd "$NYRA_ROOT"
        cargo build -q -p cli -p compiler-ffi
        echo "NYRA_HOME=$NYRA_ROOT" >> "$GITHUB_ENV"
        echo "NYRA_ROOT=$NYRA_ROOT" >> "$GITHUB_ENV"
        echo "$NYRA_ROOT/target/debug" >> "$GITHUB_PATH"
        echo "$NYRA_ROOT/target/debug/deps" >> "$GITHUB_PATH"
        if [[ "${{ inputs.platform }}" == "windows" ]]; then
          echo "C:/msys64/ucrt64/bin" >> "$GITHUB_PATH"
        fi
        if [[ "${{ inputs.platform }}" == "linux" ]]; then
          echo "LD_LIBRARY_PATH=${NYRA_ROOT}/target/debug:${NYRA_ROOT}/target/debug/deps" >> "$GITHUB_ENV"
        fi

    - name: Verify nyra
      shell: bash
      run: |
        set -euo pipefail
        nyra --version
        nyra check --help >/dev/null
